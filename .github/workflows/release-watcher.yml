name: Check for new sox_ng releases, build and push any unbuilt ones

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

# Add permissions needed for GHCR
permissions:
  contents: write    # Needed to update submodule and .built_releases
  packages: write    # Needed for GHCR

concurrency:
  group: release-watcher
  cancel-in-progress: false

jobs:
  check-build-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: sox_ng
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure submodule has all tags (handles backfilling older releases)
        run: |
          git -C sox_ng fetch --tags --depth=0 \
            || git -C sox_ng fetch --tags --unshallow \
            || git -C sox_ng fetch --tags

      - name: Determine unbuilt releases
        id: poll
        run: |
          set -euo pipefail
          API="https://codeberg.org/api/v1/repos/sox_ng/sox_ng/releases?limit=50&pre-release=false&draft=false"
          RELEASES=$(curl -fsSL \
            -H "Accept: application/json" \
            -H "User-Agent: sox_ng_dockerized-release-watcher" \
            "$API")

          touch .built_releases

          # All non-prerelease tags sorted oldest first.
          # Defense-in-depth: re-filter client-side in case Forgejo silently
          # ignores the pre-release query param on older deployments.
          ALL_TAGS_OLDEST_FIRST=$(echo "$RELEASES" \
            | jq -r '[.[] | select(.prerelease==false and .draft==false)]
                     | sort_by(.published_at) | .[].tag_name')

          # Highest semver across all non-prereleases — determines :latest.
          LATEST_TAG=$(echo "$ALL_TAGS_OLDEST_FIRST" \
            | sed 's/^sox_ng-//' | sort -V | tail -n1 | sed 's/^/sox_ng-/')

          # Diff: upstream tags not yet recorded in .built_releases.
          # grep -F -x -v -f: fixed-string, full-line, inverted, from file.
          NEW_TAGS=$(echo "$ALL_TAGS_OLDEST_FIRST" \
            | grep -F -x -v -f .built_releases || true)

          {
            echo "new_tags<<EOF"
            echo "$NEW_TAGS"
            echo "EOF"
            echo "latest_tag=$LATEST_TAG"
            if [ -n "$NEW_TAGS" ]; then
              echo "has_new=true"
            else
              echo "has_new=false"
            fi
          } >> "$GITHUB_OUTPUT"

          echo "Latest semver tag: $LATEST_TAG"
          echo "Unbuilt tags:"
          echo "$NEW_TAGS" | sed 's/^/  - /'

      - name: Set up QEMU
        if: steps.poll.outputs.has_new == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.poll.outputs.has_new == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.poll.outputs.has_new == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.poll.outputs.has_new == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # My username, Ardakilic has a capital "A"
      # This is needed to set the lowercase owner name for the image, enforced by Docker
      - name: Set lowercase owner name
        if: steps.poll.outputs.has_new == 'true'
        run: |
          echo "OWNER_LC=$(echo $OWNER | tr '[:upper:]' '[:lower:]')" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build and push each unbuilt release (oldest first)
        if: steps.poll.outputs.has_new == 'true'
        id: build
        env:
          NEW_TAGS: ${{ steps.poll.outputs.new_tags }}
          LATEST_TAG: ${{ steps.poll.outputs.latest_tag }}
        run: |
          set -uo pipefail
          GHCR_IMG="ghcr.io/${OWNER_LC}/${IMAGE_NAME}"
          HUB_IMG="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}"
          FAILED=()

          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "::group::Build $TAG"
            git -C sox_ng checkout "$TAG"

            EXTRA_TAGS=()
            if [ "$TAG" = "$LATEST_TAG" ]; then
              EXTRA_TAGS=(-t "${GHCR_IMG}:latest" -t "${HUB_IMG}:latest")
            fi

            if docker buildx build \
                --platform linux/amd64,linux/arm64,linux/arm/v7 \
                --build-arg IMAGE_NAME="${IMAGE_NAME}" \
                -t "${GHCR_IMG}:${TAG}" \
                -t "${HUB_IMG}:${TAG}" \
                "${EXTRA_TAGS[@]}" \
                --push \
                .; then
              echo "$TAG" >> .built_releases
              echo "Built and pushed $TAG"
            else
              echo "::error::Failed to build $TAG"
              FAILED+=("$TAG")
            fi
            echo "::endgroup::"
          done <<< "$NEW_TAGS"

          # Point the committed submodule pointer at the :latest tag.
          if grep -qx "$LATEST_TAG" .built_releases; then
            git -C sox_ng checkout "$LATEST_TAG"
          fi

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "Failed tags: ${FAILED[*]}"
            exit 1
          fi

      # This step runs even on partial failures so successful builds are recorded.
      # A non-zero exit from the build step marks the run as failed, triggering
      # a notification; the next cron tick will retry any unrecorded tags.
      - name: Commit successful builds
        if: always() && steps.poll.outputs.has_new == 'true'
        run: |
          set -euo pipefail
          if git diff --quiet .built_releases sox_ng; then
            echo "No state changes to commit."
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .built_releases sox_ng
          ADDED=$(git diff --cached .built_releases | grep '^+sox_ng-' | sed 's/^+//' | tr '\n' ' ')
          git commit -m "Build sox_ng release(s): ${ADDED}"
          # Tolerate a concurrent push (e.g. Renovate) landing between our
          # checkout and this push.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push
